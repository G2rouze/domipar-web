backend:
  name: git-gateway
  branch: main

media_folder: site/public/assets/uploads
public_folder: /assets/uploads

locale: fr

collections:
  - name: actualites
    label: Actualités
    label_singular: Actualité
    folder: site/src/content/actualites
    create: true
    delete: true
    slug: "{{ordre}}-{{slug}}"
    fields:
      - { label: Titre, name: titre, widget: string }
      - { label: "Date (ex: 24 MARS 2026)", name: date, widget: string }
      - { label: Résumé, name: texte, widget: text }
      - { label: Lien externe (optionnel), name: href, widget: string, required: false, hint: "URL complète vers un article, vidéo, PDF..." }
      - { label: "Ordre d'affichage (1 = le plus récent)", name: ordre, widget: number, value_type: int }
