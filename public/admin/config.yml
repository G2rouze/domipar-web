backend:
  name: git-gateway
  branch: main

media_folder: public/assets/uploads
public_folder: /assets/uploads

locale: fr

collections:
  - name: actualites
    label: Actualités
    folder: src/content/actualites
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Titre, name: titre, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Résumé, name: resume, widget: text, required: false }
      - { label: Contenu, name: body, widget: markdown }

  - name: temoignages
    label: Témoignages
    folder: src/content/temoignages
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Nom, name: nom, widget: string }
      - { label: Rôle, name: role, widget: string, required: false }
      - { label: Contenu, name: body, widget: markdown }
